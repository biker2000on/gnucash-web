# GnuCash Web - Production Docker Compose (TrueNAS)
#
# Uses pre-built images from ghcr.io with Watchtower auto-updates.
#
# Required: Create a .env file with:
#   DATABASE_URL=postgresql://user:password@host:port/database
#   NEXTAUTH_SECRET=<generate with: openssl rand -base64 32>
#   NEXTAUTH_URL=http://<truenas-ip>:3000
#   WATCHTOWER_REPO_USER=<github-username>
#   WATCHTOWER_REPO_PASS=<github-pat-with-read:packages>
#
# Optional services (enable via profiles):
#   docker compose -f docker-compose.prod.yml --profile ai up -d        # + Ollama
#   docker compose -f docker-compose.prod.yml --profile storage up -d   # + MinIO
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f

services:
  app:
    image: ghcr.io/biker2000on/gnucash-web:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - RECEIPT_STORAGE=${RECEIPT_STORAGE:-filesystem}
      - RECEIPT_S3_ENDPOINT=${RECEIPT_S3_ENDPOINT:-}
      - RECEIPT_S3_BUCKET=${RECEIPT_S3_BUCKET:-gnucash-receipts}
      - RECEIPT_S3_REGION=${RECEIPT_S3_REGION:-us-east-1}
      - RECEIPT_S3_ACCESS_KEY=${RECEIPT_S3_ACCESS_KEY:-}
      - RECEIPT_S3_SECRET_KEY=${RECEIPT_S3_SECRET_KEY:-}
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  worker:
    image: ghcr.io/biker2000on/gnucash-web:latest
    command: ["npx", "tsx", "worker.ts"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - RECEIPT_STORAGE=${RECEIPT_STORAGE:-filesystem}
      - RECEIPT_S3_ENDPOINT=${RECEIPT_S3_ENDPOINT:-}
      - RECEIPT_S3_BUCKET=${RECEIPT_S3_BUCKET:-gnucash-receipts}
      - RECEIPT_S3_REGION=${RECEIPT_S3_REGION:-us-east-1}
      - RECEIPT_S3_ACCESS_KEY=${RECEIPT_S3_ACCESS_KEY:-}
      - RECEIPT_S3_SECRET_KEY=${RECEIPT_S3_SECRET_KEY:-}
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ---- Optional: Local LLM via Ollama ----
  # Enable with: --profile ai
  # Set AI_BASE_URL=http://ollama:11434/v1 in .env
  # Pull a model: docker compose -f docker-compose.prod.yml exec ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  # ---- Optional: S3-compatible storage via MinIO ----
  # Enable with: --profile storage
  # Set RECEIPT_STORAGE=s3, RECEIPT_S3_ENDPOINT=http://minio:9000 in .env
  minio:
    image: minio/minio
    profiles: ["storage"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      REPO_USER: ${WATCHTOWER_REPO_USER}
      REPO_PASS: ${WATCHTOWER_REPO_PASS}
    restart: unless-stopped

volumes:
  redis-data:
  ollama-data:
  minio-data:
