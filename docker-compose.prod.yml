# GnuCash Web - Production Docker Compose (TrueNAS)
#
# Uses pre-built images from ghcr.io.
#
# Required: Create a .env file with:
#   DATABASE_URL=postgresql://gnucash:gnucash@postgres:5432/gnucash
#   NEXTAUTH_SECRET=<generate with: openssl rand -base64 32>
#   NEXTAUTH_URL=http://<truenas-ip>:3000
#
# Optional:
#   POSTGRES_PORT=5432            # Host port for PostgreSQL
#   MINIO_DATA_DIR=./minio-data   # Local folder for MinIO storage
#
# Optional services (enable via profiles):
#   docker compose -f docker-compose.prod.yml --profile storage up -d   # + MinIO
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f

services:
  app:
    image: ghcr.io/biker2000on/gnucash-web:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - RECEIPT_STORAGE=${RECEIPT_STORAGE:-filesystem}
      - RECEIPT_S3_ENDPOINT=${RECEIPT_S3_ENDPOINT:-}
      - RECEIPT_S3_BUCKET=${RECEIPT_S3_BUCKET:-gnucash-receipts}
      - RECEIPT_S3_REGION=${RECEIPT_S3_REGION:-us-east-1}
      - RECEIPT_S3_ACCESS_KEY=${RECEIPT_S3_ACCESS_KEY:-}
      - RECEIPT_S3_SECRET_KEY=${RECEIPT_S3_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    image: ghcr.io/biker2000on/gnucash-web:latest
    command: ["npx", "tsx", "worker.ts"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - RECEIPT_STORAGE=${RECEIPT_STORAGE:-filesystem}
      - RECEIPT_S3_ENDPOINT=${RECEIPT_S3_ENDPOINT:-}
      - RECEIPT_S3_BUCKET=${RECEIPT_S3_BUCKET:-gnucash-receipts}
      - RECEIPT_S3_REGION=${RECEIPT_S3_REGION:-us-east-1}
      - RECEIPT_S3_ACCESS_KEY=${RECEIPT_S3_ACCESS_KEY:-}
      - RECEIPT_S3_SECRET_KEY=${RECEIPT_S3_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gnucash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnucash}
      POSTGRES_DB: ${POSTGRES_DB:-gnucash}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gnucash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ---- Optional: S3-compatible storage via MinIO ----
  # Enable with: --profile storage
  # Set RECEIPT_STORAGE=s3, RECEIPT_S3_ENDPOINT=http://minio:9000 in .env
  minio:
    image: minio/minio
    profiles: ["storage"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ${MINIO_DATA_DIR:-./minio-data}:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped


volumes:
  postgres-data:
  redis-data:
